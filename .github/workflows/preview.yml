name: Preview

on:
  workflow_dispatch:
  pull_request:

permissions: {}

jobs:
  format:
    if: github.repository_owner == 'bombshell-dev'
    uses: bombshell-dev/automation/.github/workflows/preview.yml@3a8b4a38fe464b0b51d14962ae416a169517fba9  # main as of 2026-05-13
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    with:
      publish: "."
