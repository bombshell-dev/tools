name: Preview

on:
  workflow_dispatch:
  pull_request:

jobs:
  format:
    if: github.repository_owner == 'bombshell-dev'
    uses: bombshell-dev/automation/.github/workflows/preview.yml@main
    secrets: inherit
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    with:
      publish: "."
